apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmago-pharmacy-service
  namespace: pharmago
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: pharmago-pharmacy-service
  template:
    metadata:
      labels:
        app: pharmago-pharmacy-service
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values: [backend, all]
      containers:
      - name: pharmago-pharmacy-service
        image: pharmago-pharmacy-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Server=pharmago-db;Database=PharmaDb;User Id=sa;Password=Str0ngP@ssword!"
        - name: ServiceUrls__UsersService
          value: "http://pharmago-users-service:80"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: Logging__LogLevel__Microsoft.EntityFrameworkCore
          value: "None"
        - name: Logging__LogLevel__Microsoft.Data.SqlClient
          value: "None"
        # Recursos reducidos para nodos ~5GB (proyecto docente)
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "1500m"
        startupProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30

