apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: pharmago
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values: [ops, all]
      securityContext:
        fsGroup: 0
      initContainers:
      - name: wait-for-prometheus
        image: busybox:1.36
        command: ['sh', '-c', 'until wget -q -O- http://prometheus:9090/-/healthy; do echo "Waiting for Prometheus..."; sleep 5; done; echo "Prometheus ready"']
      - name: volume-permissions
        image: busybox:1.36
        command: ['sh', '-c']
        args:
          - |
            chown -R 472:0 /var/lib/grafana
            chmod -R 775 /var/lib/grafana
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
      containers:
      - name: grafana
        image: grafana/grafana:10.4.2
        securityContext:
          runAsUser: 472
          runAsGroup: 0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_INSTALL_PLUGINS
          value: ""
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-provisioning
          mountPath: /etc/grafana/provisioning/datasources/datasources.yml
          subPath: datasources.yml
        - name: grafana-provisioning
          mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
          subPath: dashboards.yml
        - name: grafana-dashboards
          mountPath: /etc/grafana/provisioning/dashboards/pharmago-overview.json
          subPath: pharmago-overview.json
        - name: grafana-dashboard-infra
          mountPath: /etc/grafana/provisioning/dashboards/pharmago-infra.json
          subPath: pharmago-infra.json
        - name: grafana-alerting-rules
          mountPath: /etc/grafana/provisioning/alerting/pharmago-alerts.yaml
          subPath: pharmago-alerts.yaml
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        startupProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 36
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-provisioning
        configMap:
          name: grafana-provisioning
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards
      - name: grafana-dashboard-infra
        configMap:
          name: grafana-dashboard-infra
      - name: grafana-alerting-rules
        configMap:
          name: grafana-alerting-rules

