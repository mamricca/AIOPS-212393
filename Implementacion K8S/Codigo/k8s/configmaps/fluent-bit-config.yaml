apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: pharmago
  labels:
    k8s-app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020

    @INCLUDE input-kubernetes.conf
    @INCLUDE filter-kubernetes.conf
    @INCLUDE output-elasticsearch.conf

  input-kubernetes.conf: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        # JSON app logs (scopes, State) are often longer than SQL fragments; skipping them removes Message/Category from ES.
        Skip_Long_Lines   Off
        Buffer_Max_Size   1MB
        # Reensambla líneas partidas por el driver de logs de Docker (>~16KB) en un solo registro.
        Docker_Mode       On
        Docker_Mode_Flush 5
        Refresh_Interval   10

  filter-kubernetes.conf: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        # Merge_Log off: EF SQL and other plain lines stay only in "log". JSON app lines are lifted by parser below.
        Merge_Log           Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude  Off

    # When "log" is a single-line JSON object (.NET console JSON), lift Message, Category, LogLevel, etc. to top-level for KQL.
    # Non-JSON lines (e.g. SQL) are unchanged — no "Message" field, so they do not match Message-based queries.
    [FILTER]
        Name                parser
        Match               kube.*
        Key_Name            log
        Parser              dotnet_console_json
        Reserve_Data        On

  output-elasticsearch.conf: |
    [OUTPUT]
        Name                es
        Match               *
        Host                elasticsearch
        Port                9200
        Logstash_Format     On
        Logstash_Prefix     pharmago-logs
        Replace_Dots       On
        Retry_Limit         False
        Buffer_Size         False
        Suppress_Type_Name  On

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        dotnet_console_json
        Format      json
