apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-rb01
  namespace: pharmago
data:
  pharmago-rb01.json: |
    {"title":"PharmaGo - RB-01 5xx Error Rate","uid":"pharmago-rb01","tags":["pharmago","rb01"],"time":{"from":"now-15m","to":"now"},"refresh":"10s","panels":[
      {"id":1,"title":"Tasa de errores (alerta RB-01)","type":"timeseries","gridPos":{"x":0,"y":0,"w":24,"h":9},"datasource":{"type":"prometheus","uid":"prometheus"},"targets":[
        {"expr":"sum(rate(pharmago_http_errors_total[1m]))","legendFormat":"errors/s (total)","refId":"A"},
        {"expr":"vector(0.1)","legendFormat":"Umbral alerta (0.1 req/s)","refId":"B"}
      ],"fieldConfig":{"defaults":{"unit":"reqps","min":0},"overrides":[{"matcher":{"id":"byName","options":"Umbral alerta (0.1 req/s)"},"properties":[{"id":"color","value":{"mode":"fixed","fixedColor":"red"}},{"id":"custom.lineStyle","value":{"dash":[10,10],"fill":"dash"}}]}]},"options":{"legend":{"calcs":["last","max"],"displayMode":"table","placement":"bottom","showLegend":true}}},
      {"id":2,"title":"Errores por tipo","type":"timeseries","gridPos":{"x":0,"y":9,"w":12,"h":8},"datasource":{"type":"prometheus","uid":"prometheus"},"targets":[
        {"expr":"sum by(error_type)(rate(pharmago_http_errors_total[1m]))","legendFormat":"{{error_type}}","refId":"A"}
      ],"fieldConfig":{"defaults":{"unit":"reqps","min":0}},"options":{"legend":{"calcs":["last"],"displayMode":"table","placement":"bottom","showLegend":true}}},
      {"id":3,"title":"Tasa de requests totales","type":"timeseries","gridPos":{"x":12,"y":9,"w":12,"h":8},"datasource":{"type":"prometheus","uid":"prometheus"},"targets":[
        {"expr":"sum(rate(pharmago_http_requests_total[1m]))","legendFormat":"requests/s","refId":"A"}
      ],"fieldConfig":{"defaults":{"unit":"reqps","min":0}},"options":{"legend":{"calcs":["last","max"],"displayMode":"table","placement":"bottom","showLegend":true}}},
      {"id":4,"title":"Estado pod DB (segundos desde ultimo heartbeat)","type":"timeseries","gridPos":{"x":0,"y":17,"w":24,"h":7},"datasource":{"type":"prometheus","uid":"prometheus"},"targets":[
        {"expr":"time() - container_last_seen{namespace=\"pharmago\", pod=~\"pharmago-db.*\"}","legendFormat":"segundos sin heartbeat","refId":"A"}
      ],"fieldConfig":{"defaults":{"unit":"s","min":0},"overrides":[{"matcher":{"id":"byName","options":"segundos sin heartbeat"},"properties":[{"id":"color","value":{"mode":"fixed","fixedColor":"orange"}}]}]},"options":{"legend":{"calcs":["last"],"displayMode":"table","placement":"bottom","showLegend":true}}}
    ],"schemaVersion":38,"version":1}
